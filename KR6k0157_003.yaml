body:
  text: 餘杭郡沙門釋元照録二授具戒法二初牒章分文二初下隨文別釋二初標舉衆名二初標分二言下隨釋二初釋標舉二初正釋三初敘翻傳二中下釋名義三如下明存梵二餘下指廣二二下釋列緣三初標列章門二初下隨章正釋五初列數顯相二初正明二初總示二初下列釋二初僧中五受二初正明五初善來二破結三三語四邊方五人五中國十人二有下斥異二初引異解二初立理二釋妨二明今斥二就下尼中五受二初正明五受二初標舉二初下別釋五初八敬二二十衆三遣信四小年曾嫁五邊方十人二初例僧義立二初正明今立二有下斥古妄廢二若下明神州元始二以下總通七受二問答二初邊方不成開二遣信異殺盜二通局不同二初牒章分科二初下隨位別釋六初約受二約報二初標舉二依下列釋五初善來二初據本律以示二如下會經論相違二破結三三語四八敬五羯磨三約時四約方二初標舉二善下正釋二初明二州通塞二初善來八敬唯局二羯下簡餘三通局二北下簡北州唯塞五約漸頓二初標分二初下隨釋二初大小通局二初正明二問答二二下別就小論二初總示二故下別釋二初羯磨唯局漸三初約諸教正明二引多論辨㭊四初問頓得何須前受二問漸受前戒失否三問頓受體分幾種二初問答二若下轉難四問頓受捨時如何三上下結示二善下餘四通漸頓六約諸部三初示本數生起二十下引律論別明二初引律三初十誦十種二僧祗八種三五分十二種二初正明二問答二初問三語有缺何開二問破惡理非在局二上下引論二初結前標後二如下引論正明七初多論七種二初正明通局二別問三歸二伽論十種三善見八種四母論七種五雜心十種六俱舍十種七了論九種三初總示二一下別明二初釋依他七受二初列示二初僧中四種四初善來二三歸三略羯磨四廣羯磨二尼下尼中三種二此下通釋二獨下釋自證二受三於下結通局三上下括諸部通局三秉法差別四教被凡聖五藉緣多少三具下指廣如後二就下隨緣正解三秉法差別三初標舉二多下正明三問答二初問兩受勝劣二問佛秉善來三初正伸問答二八下重簡八敬三如下引論通示二初正明二問答四教被凡聖二初標章二善下正釋四初善來二三語八敬三初通明二受二別問三語三八下重簡八敬三破結四若下羯磨五藉緣多多二初牒章分位二初下隨位別釋四初約緣明受二初列示四受二初正明四初善來二破結三三語四八敬二問答二羯下略釋羯磨二對辨同異二初標舉二初下列釋五如文三約受優劣二初標舉二初下正釋三初就緣二對過三對功能四顯法前後二初牒名二善下正釋二初具戒前後二餘下未具前後二就緣正解二初標指分文二前下隨文別釋三初釋緣三初分示二就下正解二初就法辨緣二初分文二文下別釋二初顯戒德尊高二今下依緣略簡二初釋總標二就下釋別相五初能受人三初標舉敘由二初下牒文正釋五初唯是人道二諸根具足三初明簡意二但下敘形報三至下簡輕重三身器清淨二初明簡意二文下牒文解四出家相具五得少分法三上下結示得不二所對境二初標示二一下列數二初正釋七初結界成就二能秉法人三僧數滿足二初牒釋二今下斥濫四界內盡集五白四教法六資緣具足七佛法時中二上下料簡二初總束四緣二成下次決成敗二初總分兩異二若下別簡事資三發心乞戒四心境相當五事成究竟二就下就事辨緣二釋法三釋相二就下就事辨緣三初牒章總舉二初下隨位別明八初明請師法二初分文二初下隨釋二初敘師資教興二初分示二初下牒釋二初明緣致三初釋立和尚緣三初敘制意二中下翻名釋義三文下釋敬攝二又下釋立弟子緣初敘制意二言下釋名義三師下明相攝三善下釋制請緣二文下修䖍敬二就下明立法加被二初標分二初下隨釋二初釋請法二初明請儀二請下釋請詞二次下釋答詞二初釋和尚詞句四初標示二告下列釋三初下別釋四有下明四所以二文下釋諸師例同四初明請意二今下斥時訛三阿下釋名義二初二師二外下餘師四請下示請法二安受者所三差人問緣四出衆問法五白召入衆六明乞戒七戒師和問法八正問法三上下結斷通塞二安受者所二初標示二云下示釋初安界外二言下離見聞三文下立望三差人問緣三初標緣二如下示意三就下牒釋四出衆問法二初標分二就下隨釋三初示其衣鉢二初繹審問安慰二列下釋示衣鉢名相二初正釋二問答二二下正辨問難二初標分二敕下正釋二初定其思審二將下依數列問二初先以義引二初分文二初下隨釋五初制簡淨意二正釋名體二初標章列數二初下正釋名體二初釋名八初邊罪二初正釋二自下指例二壞尼三賊住四破內外道二初正明二釋妨二初問答二轉難五黃門六至十五逆四初殺父母二殺阿羅漢三破和合僧四出佛身血十一非人畜生十三二形二次下定體二初標分二初下隨釋二初依名定體二初正明二問答二次下辨離合二初標二問下釋二初問邊逆離合二引諸師義解三初約違教有無釋二約離合繁濫釋二初正釋二若下轉難三約簡俗不具釋三得名廢立二初標舉二先下正釋二初據名二初標二非下釋二初約四義釋二又下約三義釋二次下諍名二初標二問下釋二初總問通名二別問初難二初問答二轉難二初引尼例難二有下約義各釋二初約尼無以釋二若下今約違教釋四收難多少二初牒章分科二就下隨科別釋三初總明盡不二初標章二言下正釋二初約攝不盡三初引教文四初多論二善見二僧祗四了論二義下約義說二若下斷成不二又下明攝盡二初正明二問答二初舉小年以